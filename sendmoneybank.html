<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferencias</title>

    <!--bootstrap-->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--CSS-->

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <!--cabecera-->

    <header>
        <h1 class="text-center">Transferencias Alke Wallet</h1>
        <div>
        <button class="btn btn-danger position-fixed top-0 end-0 m-3" id="logout">Cerrar sesión</button>
        </div>
    </header>

    <!--formulario transferencia-->

    <main class="container mt-5">
        <div class="card shadow-lg border-0 p-4">
            <h2 class="d-flex justify-content-center">Transferir</h2>
            <h4 class="d-flex justify-content-center">Envíe dinero a otras personas y deposite entre cuentas propias!
            </h4>
            <div>
                <h3 class="title">Datos del receptor</h3>
            </div>
            <form id="form-transfer">
                <div>
                    <div class="mb-3 w-100">
                        <label for="nombre" class="form-label">Nombre receptor</label>
                        <input type="text" class="form-control" name="nombre" id="nombre" required>
                    </div>
                    <div class="mb-3 w-100">
                        <label for="banco" class="form-label">Banco destinatario</label>
                        <select id="banco" name="destinatario" class="form-select" required>
                            <option value="" selected disabled>Seleccione el Banco</option>
                            <option value="estado">Banco del Estado</option>
                            <option value="santander">Banco Santander</option>
                            <option value="bci">Banco BCI</option>
                            <option value="chile">Banco de Chile</option>
                            <option value="falabella">Banco Falabella</option>
                            <option value="itau">Banco Itaú</option>
                            <option value="bice">Banco BICE</option>
                            <option value="scotiabank">Scotiabank</option>
                        </select>
                    </div>
                    <div class="mb-3 w-100">
                        <label for="tpo-cta" class="form-label">Tipo de cuenta</label>
                        <select id="tpo-cta" name="tipoCuenta" class="form-select" required>
                            <option value="" selected disabled>Seleccione un tipo de cuenta</option>
                            <option value="corriente">Corriente</option>
                            <option value="vista">Vista</option>
                            <option value="ahorro">Ahorro</option>
                            <option value="rut">CuentaRut</option>
                        </select>
                    </div>
                    <div class="mb-3 w-100">
                        <label for="nro-cta" class="form-label">Número de cuenta destino</label>
                        <input type="text" class="form-control" name="nro-cta" id="nro-cta" maxlength="20" required>
                    </div>
                    <div class="mb-3 w-100">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" name="email" id="email" required>
                    </div>
                    <div class="form-check">
                        <label for="frecuente" class="form-check-label">Hacer de éste un destinatario frecuente</label>
                        <input type="checkbox" class="form-check-input" id="frecuente">
                    </div>
                    <hr>
                    <div>
                        <h3 class="title">Datos del emisor</h3>
                    </div>
                    <div class="mb-3">
                        <label for="origen" class="form-label">Cuenta de origen</label>
                        <input type="text" class="form-control" name="origen" id="origen" maxlength="20" required>
                    </div>
                    <div class="mb-3">
                        <label for="monto" class="form-label">Monto a transferir</label>
                        <input type="number" class="form-control" name="monto" id="monto" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label for="clave">Contraseña</label>
                        <input type="password" class="form-control" name="clave" id="clave" minlength="8" required>
                    </div>

                    <!--botón de accióm-->

                    <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
                        <button type="submit" class="btn btn-primary mt-3">Transferir</button>
                    </div>
                </div>
            </form>
        </div>

    </main>

    <!--pie de página-->

    <footer>
        <p class="pie">2026 Alke Wallet</p>
        <div class="text-center">
            <a href="menu.html">Volver al inicio</a>
        </div>
    </footer>

    <!--javascript-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/sendmoney.js"></script>

</body>

</html>
