<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar a cuenta Alke Wallet</title>
    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!--header depósitos-->    
    <header>
        <h1 class="d-flex justify-content-center">Depósitos</h1>
        <h3 class="d-flex justify-content-center">Aquí puede realizar depósitos a sus cuentas personales de Alke Wallet</h3>
    </header>

<!--formulario depósitos-->    
    <main class="container mt-5">
        <div class="card p-4">
            <form class="box_deposit">
                <div class="mb-3">
                    <label for="banco" id="banco">Banco de origen</label>
                    <select id="banco" name="origen" class="form-select" required>
                        <option value="" selected disabled>Seleccione un banco</option>
                        <option value="estado">Banco del Estado</option>
                        <option value="santander">Banco Santander</option>
                        <option value="bci">Banco BCI</option>
                        <option value="chile">Banco de Chile</option>
                        <option value="falabella">Banco Falabella</option>
                        <option value="itau">Banco Itaú</option>
                        <option value="bice">Banco BICE</option>
                        <option value="scotiabank">Scotiabank</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="tpo-cta">Tipo de cuenta</label>
                    <select id="tpo-cta" name="tipo_cuenta" class="form-select" required>
                        <option value="" selected disabled>Seleccione un tipo de cuenta</option>
                        <option value="corriente">Corriente</option>
                        <option value="vista">Vista</option>
                        <option value="ahorro">Ahorro</option>
                        <option value="rut">CuentaRut</option>
                    </select>
                </div>

<!--formulario ingreso numerico-->

                <div class="mb-3">
                    <label for="cuenta">Número de cuenta</label>
                    <input type="text" class="form-control" name="cuenta" id="cuenta" pattern="[0-9]+" required>
                </div>
                <div class="mb-3">
                    <label for="monto">Monto a depositar</label>
                    <input type="number" class="form-control" id="monto" min="1" required>
                </div>
                <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
                <button type="submit" class="btn btn-primary mt-3">Depositar</button>
            </div>
            </form>
        </div>
    </main>

<!--pie de pagina-->

    <footer>
        <p class="pie">© 2026 Alke Wallet</p>
        <div class="text-center">
            <a href="menu.html">Volver al inicio</a>
        </div>
    </footer>

<!--javascript-->    

    <script src="assets/js/script.js"></script>

</body>

</html>
