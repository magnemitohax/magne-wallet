<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse en Alke Wallet</title>

    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!--cabecera de pagina-->

    <header>
        <h1 class="title">Alke Wallet</h1>
    </header>

    <!--formulario de registro-->

    <main class="container" id="registro">
        <div class="text-center">
            <h3>Registro</h3>
            <p>Regístrate en Alke Wallet y entrarás a un mundo de beneficios!</p>
        </div>
        <div class="form">
            <form action="menu.html" method="post" id="form-registro">
                <div class="mb-3 w-100">
                    <label for="nombre" class="form-label">Nombre:</label><br>
                    <input type="text" id="nombre" class="form-control" name="nombre" placeholder="Tu nombre" id="nombre" required><br>
                </div>
                <div class="mb-3 w-100">
                    <label for="email" class="form-label">Correo electrónico:</label><br>
                    <input type="email" id="email" class="form-control" name="email" placeholder="tu@email.com" id="email" required><br>
                </div>
                <div class="mb-3 w-100">
                    <label for="fono" class="form-label">Teléfono:</label><br>
                    <input type="tel" id="fono" class="form-control" name="fono" placeholder="+569xxxxxxxx" required><br>
                </div>
                <div class="mb-3 w-100">
                    <label for="nacimiento" class="form-label">Fecha de nacimiento</label><br>
                    <input type="date" id="birth" class="form-control" name="nacimiento" placeholder="01/01/2000" required><br>
                </div>
                <div class="mb-3 w-100">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="password" id="password">
                </div>
                <div class="mb-3 w-100">
                    <label for="password" class="form-label">Confirmar contraseña</label>
                    <input type="password" class="form-control" name="confirmarpassword" id="confirmarpassword">
                </div>
            </form>
        </div>

        <!--botón de acción-->

        <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
            <button type="submit" class="btn btn-primary mt-3">Registrarse</button>
        </div>
    </main>

    <div class="text-center">
        <p>Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>

    <!--pie de pagina-->

    <footer>
        <p class="pie"> 2026 Alke Wallet</p>
    </footer>

    <!--javascript-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="assets/js/script.js"></script>

</body>


</html>
