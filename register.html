<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse en Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <h1 class="title">Inscríbase en Alke Wallet</h1>
    </header>

    <main class="container mt-5" id="registro">
        <div class="form">
            <
            <h2 class="title">Registro Alke Wallet</h2>
            <form action="menu.html" method="post" id="form-registro">
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" id="nombre" required><br>
                <label for="email">Correo electrónico:</label><br>
                <input type="email" id="email" name="email" placeholder="tu@email.com" id="email" required><br>
                <label for="fono">Teléfono:</label><br>
                <input type="tel" id="fono" name="fono" placeholder="+569xxxxxxxx" required><br>
                <label for="nacimiento">Fecha de nacimiento</label><br>
                <input type="date" id="nacimiento" name="nacimiento" placeholder="01/01/2000" required><br>
            </form>
        </div>
        <div>
            <a href="menu.html" target="_blank" class="boton-menu">Registrarse</a>
        </div>
    </main>

    <footer>
        <p class="pie"> 2026 Alke Wallet</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

     <script src="assets/js/script.js"></script>

</body>


</html>
