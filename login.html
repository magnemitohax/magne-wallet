<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Alke Wallet</title>
    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!--header login-->

    <header>
        <h1 class="title">Alke Wallet</h1>
    </header>

    <!--login-->

    <main class="container" id="index">
        <div class="text-center">
            <h3>Inicio de sesión</h3>
            <p>Ingrese a su portal privado de Alke Wallet</p>
        </div>

        <div class="form mb-5">
            <h3 class="title">Login</h3>
            <form id="form-login">
                <div class="mb-3" id="nameLogin">
                    <label for="nombre" class="form-label">Usuario</label>
                    <input type="text" class="form-control" name="nombre" id="nombre" required>
                </div>
                <div class="mb-3" id="passwordLogin">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-4">
                    <button type="submit" class="btn btn-primary mt-3">Iniciar sesión</button>
                </div>
                <div class="form-check" id="paswordRemember">
                    <label for="recordar-datos" class="form-check-label">Recordar mis datos en este navegador</label>
                    <input type="checkbox" class="form-check-input" id="recordar-datos">
                </div>
                <div class="text-center">
                    <p>No tienes cuenta? <a href="register.html">Regístrate!</a></p>
                </div>
            </form>
        </div>
    </main>

    <!--pie de pagina-->

    <footer>
        <p class="pie">2026 Alke Wallet</p>
    </footer>

    <!--javascript-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="assets/js/script.js"></script>

</body>

</html>
