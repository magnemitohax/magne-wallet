<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Transferencias | Alke Wallet</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <!-- Encabezado -->

    <header class="container mt-4">
        <h1 class="text-center">
            Transferencias a otros usuarios Alke Wallet</h1>
        <button id="logout" class="btn btn-danger position-fixed top-0 end-0 m-3">
        Cerrar sesión
        </button>
    </header>

<!-- Contenido -->

    <main class="container mt-5">
        <div class="card shadow-lg border-0 p-4">
            <h2 class="text-center mb-4">Enviar dinero</h2>

<!-- Saldo -->

    <div class="alert alert-info text-center">Saldo disponible
    <br>
    <strong class="saldo"></strong>
    </div>

<!-- Mensajes -->

    <div id="mensaje"></div>

<!-- Formulario -->

    <form id="formEnvio">

<!-- Buscar usuario -->

    <div class="mb-3">
        <label  for="buscarUsuario" class="form-label">
            Buscar destinatario
        </label>

    <input  type="text" id="buscarUsuario" class="form-control" placeholder="Nombre o @usuario">
    </div>

<!-- Resultados -->

    <div id="listaUsuarios" class="list-group mb-3"></div>

<!-- Monto -->

    <div class="mb-3">
        <label for="monto" class="form-label">Monto</label>
        <input type="number" id="monto" class="form-control" min="1" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Transferir</button>

    </form>
    <hr>

<!-- Contactos -->

    <h3 class="mt-4">Agregar contacto</h3>
        <form id="formContacto">
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuario (@usuario)</label>
                <input type="text" id="usuario" class="form-control" placeholder="Ejemplo: fernando" required>
            </div>
            <button type="submit" class="btn btn-success">Agregar contacto</button>
        </form>
        <hr>

<!-- Lista -->

    <h3>Mis contactos</h3>
    <div>
        <ul id="listaContactos" class="list-group">
        </ul>
    </div>

    </main>

<!-- Pie -->

    <footer class="text-center mt-5 mb-3">
        <p>© 2026 Alke Wallet</p>
        <a href="menu.html">Volver al menú</a>
    </footer>

<!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript -->

    <script src="assets/js/sendmoney.js"></script>

</body>

</html>
